<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project | Dibble Web Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">DIBBLE <span class="text-accent">WEB DESIGN</span></a>
            <div class="ms-auto">
                <a href="index.html" class="nav-link d-inline-block text-white me-3">Home</a>
                <a href="work.html" class="nav-link d-inline-block text-white">Our Work</a>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Ready to <span class="text-accent">Grow?</span></h1>
            <p class="lead text-muted mx-auto mt-3" style="max-width: 650px;">Initialize your project consultation. Once submitted, we will schedule a conference to outline your strategy.</p>
        </div>
    </header>

    <section class="container py-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="prof-card p-4 p-md-5">
                    <form action="https://formspree.io/f/xaqalola" method="POST">
                        <div class="row g-4">
                            <div class="col-md-12"><label class="small fw-bold text-muted mb-2">FULL NAME</label><input type="text" name="name" class="form-control p-3" required></div>
                            <div class="col-md-6"><label class="small fw-bold text-muted mb-2">EMAIL ADDRESS</label><input type="email" name="email" class="form-control p-3"></div>
                            <div class="col-md-6"><label class="small fw-bold text-muted mb-2">PHONE NUMBER</label><input type="tel" name="phone" class="form-control p-3"></div>
                            <div class="col-md-6">
                                <label class="small fw-bold text-muted mb-2">PROJECT TYPE</label>
                                <select name="type" class="form-select p-3">
                                    <option value="business">Business Website</option>
                                    <option value="store">Online Store</option>
                                    <option value="custom">Custom Application</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="small fw-bold text-muted mb-2">TIME FRAME</label>
                                <select name="deadline" class="form-select p-3">
                                    <option value="asap">ASAP</option>
                                    <option value="month">1 Month</option>
                                    <option value="flexible">Flexible</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="small fw-bold text-muted mb-2">ROUGH OUTLINE</label>
                                <textarea name="message" class="form-control p-3" rows="4"></textarea>
                            </div>
                            <div class="col-12"><button type="submit" class="btn btn-primary w-100 py-3 mt-3">INITIALIZE CONSULTATION</button></div>
                        </div>
                        <input type="hidden" name="_next" value="https://adriand07.github.io/dibble-web-design/index.html">
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 text-center mt-5 border-top border-secondary">
        <p class="text-muted small mb-0">&copy; 2026 Dibble Web Design</p>
    </footer>

</body>
</html>
